services:
  - type: web
    name: finance-copilot
    runtime: docker
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: LLM_PROVIDER
        value: openai
      - key: LLM_BASE_URL
        value: https://api.groq.com/openai/v1
      # gpt-oss-120b: separate Groq rate-limit pool from the llama-3.3-70b
      # judge used by the llm-eval-harness CI gate on the same key
      - key: LLM_MODEL
        value: openai/gpt-oss-120b
      - key: LLM_API_KEY
        sync: false # set in the Render dashboard — never committed
